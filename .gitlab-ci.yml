stages:
  - build
  
Debian:
  tags:
    - docker
    - linux
  image: gcc
  cache:
    key: apt-cache
    paths:
    - apt-cache/
  before_script:
    - export APT_CACHE_DIR=`pwd`/apt-cache && mkdir -pv $APT_CACHE_DIR
    - apt-get update -yq 
    - apt-get -o dir::cache::archives="$APT_CACHE_DIR" install -y cmake libboost-filesystem-dev libboost-program-options-dev libboost-system-dev libboost-iostreams-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev libsdl2-dev libqt4-dev libopenal-dev libopenscenegraph-3.4-dev libunshield-dev libtinyxml-dev libmygui-dev libbullet-dev
  stage: build
  script: 
    - cores_to_use=$((`nproc`-2)); if (( $cores_to_use < 1 )); then cores_to_use=1; fi
    - mkdir build; cd build; cmake -DCMAKE_BUILD_TYPE=MinSizeRel ../
    - make -j$cores_to_use
    - DESTDIR=artifacts make install
  artifacts:
    paths:
      - build/artifacts/

MacOS:
  tags:
    - macos
    - xcode
  except:
    - branches # because our CI VMs are not public, MRs can't use them and timeout
  stage: build
  allow_failure: true
  script:
    - rm -fr build/*  #  remove anything in the build directory
    - CI/before_install.osx.sh
    - CI/before_script.osx.sh
    - cd build; make -j2 package
  artifacts:
    paths:
      - build/OpenMW-*.dmg

Windows:
  tags:
    - windows
  before_script:
    - Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
    - choco install git --force --params "/GitAndUnixToolsOnPath" -y
    - choco install 7zip -y
    - choco install cmake.install --installargs 'ADD_CMAKE_TO_PATH=System' -y
    - choco install windbg -y
    - refreshenv
  stage: build
  variables:
    STEP: openmw
  script:
    - dir "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\VC\Auxiliary\Build"
    - $env:Path += ";C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\VC\Auxiliary\Build"
    - $env:Path += ";C:\Program Files (x86)\Windows Kits\10\Debuggers\x64"
    - $env:Path += ";$(Join-Path -Path (Get-Location) -ChildPath "CI")"
    - $install_dir = Join-Path -Path (Get-Location) -ChildPath "install"
    - sh -ex CI/before_script.msvc.sh -c Release -p x64 -v 2019 -V -k -b ninja -i $install_dir
    - MSVC2019_64_ninja_Release\cmake_build.bat
    - MSVC2019_64_ninja_Release\cmake_build_install.bat
    - 7z a -tzip OpenMW_MSVC2019_64_${CI_BUILD_REF_NAME}_${CI_BUILD_ID}.zip $install_dir
  cache:
    paths:
    - deps
  artifacts:
    when: always
    paths:
    - "*.zip"
